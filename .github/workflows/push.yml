name: 📰 新闻早报推送

on:
  schedule:
    - cron: "50 4 * * *"    # 测试2，约 30 分钟后触发
    - cron: "30 23 * * *"   # 正式，北京时间 7:30
  workflow_dispatch:

jobs:
  domestic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: 🇨🇳 国内新闻
        env:
          REGION: domestic
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: python main.py

  international:
    runs-on: ubuntu-latest
    needs: domestic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: 🌍 国际新闻
        env:
          REGION: international
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: python main.py
